<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- header -->

<div class="pt-28 container mx-auto px-6">

<h1 class="text-3xl font-black mb-6">Contact Us</h1>

<form class="space-y-4 max-w-lg">
<input type="text" placeholder="Name" class="w-full p-3 border">
<input type="email" placeholder="Email" class="w-full p-3 border">
<textarea placeholder="Message" class="w-full p-3 border"></textarea>

<button class="bg-blue-800 text-white px-6 py-3">Submit</button>
</form>

</div>

<script src="js/main.js"></script>
</body>
</html>
